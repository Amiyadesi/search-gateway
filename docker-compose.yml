services:
  api:
    build: .
    container_name: search-gateway-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,redis,searxng,groksearch-bridge,search-gateway-redis,search-gateway-api,search-gateway-searxng,search-gateway-groksearch-bridge}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - default
      - edge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.4.5-alpine@sha256:bb186d083732f669da90be8b0f975a37812b15e913465bb14d845db72a4e3e08
    container_name: search-gateway-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - default
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  groksearch-bridge:
    build: ./groksearch-bridge
    container_name: search-gateway-groksearch-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8010
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,groksearch-bridge,search-gateway-groksearch-bridge}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - default
      - edge
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  searxng:
    image: ${SEARXNG_IMAGE:-ghcr.io/searxng/searxng@sha256:969e3d79c400b26b7b83c023ef48300d9e122e0828ef7160daac990b1ac27d7c}
    container_name: search-gateway-searxng
    profiles: ["searxng"]
    restart: unless-stopped
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-change-me-local-only}
      - SEARXNG_BIND_ADDRESS=0.0.0.0
      - SEARXNG_PORT=8080
      - SEARXNG_LIMITER=false
      - SEARXNG_PUBLIC_INSTANCE=false
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,searxng,search-gateway-searxng}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng
    networks:
      default:
        aliases:
          - searxng
      edge: {}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  searxng-cache:

networks:
  edge:
    name: ${EDGE_NETWORK_NAME:-search-gateway-edge}
    external: ${EDGE_NETWORK_EXTERNAL:-false}
